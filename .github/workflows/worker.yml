name: Deploy contact worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/contact/**'
      - '.github/workflows/worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Test worker
        working-directory: workers/contact
        run: pnpm test

      - name: Typecheck worker
        working-directory: workers/contact
        run: pnpm typecheck

      - name: Deploy worker
        working-directory: workers/contact
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
